<div class="container">
     <!-- add here page icon ? -->
    <!-- add pending (spinner ? with overlay) -->
    <form novalidate (submit)="onSubmit($event)">
        <h2>Creating account</h2>
        <div class="inputs">
            <p class="gender-text">Gender*</p>
            <div class="gender">    
                <div class="option">
                    <p class="input-name">Male</p>
                    <input type="radio" value="Male" [formField]="signUpForm.gender">
                </div>
                <div class="option">
                    <p class="input-name">Female</p>
                    <input type="radio" value="Female" [formField]="signUpForm.gender">
                </div>
            </div>
            <div class="name-details">
                <div class="card">
                    <p class="input-name">First Name*</p>
                    <input type="text" [formField]="signUpForm.firstName">   
                </div>
                <div class="card">
                    <p class="input-name">Last Name*</p>
                    <input type="text" [formField]="signUpForm.lastName">  
                </div>
                <div class="card">
                    <p class="input-name">E-mail*</p>
                    <input type="text" [formField]="signUpForm.email">
                </div>
                <div class="card">
                    <p class="input-name">Password*</p>
                    <input type="password" [formField]="signUpForm.password">
                </div>
                <div class="card">
                    <p class="input-name">Phone number</p>
                    <input type="text" [formField]="signUpForm.phone">
                </div>
                <p class="rules">By using ModernVista Apartments you agree to the <a href="#">Terms of Service</a>, <a href="#">Privacy Policy</a> and <a href="#">Coockie Policy</a> </p>
                <button type="submit">Sign up</button>
            </div>
        </div>
    </form>
</div>
