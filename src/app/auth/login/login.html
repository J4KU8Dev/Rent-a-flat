<div class="container">
    @if (this.authService.currentUser()) {
        <p>You are logged as {{this.authService.currentUser()}}</p>
    }
    @else {
        <div class="content">
            <h2>Account login</h2>
            <form novalidate class="login" (submit)="onSubmit($event)">
                <p>E-mail address</p>
                <input type="email" [formField]="signalLoginModel.email" placeholder="Type your email">
                <p>Password</p>
                <input type="password" [formField]="signalLoginModel.password" placeholder="Type your password">
                <div class="options">
                    <div class="create-account-content">
                        <a routerLink="/createAccount">Create account</a>
                    </div>
                    <div class="forgot-password-container">
                        <a (click)="openModal()">Reset password</a>
                    </div>
                </div>
                <button type="submit">Log in</button>
            </form>
        </div>
        @if(isOpen()) {
            <div class="resetPasswordModal">
                 @if(userToReset()){
                    <form class="reset-function" novalidate (submit)="resetPassword($event)">
                        <span>Enter new password</span>
                        <input type="password" placeholder="New password" [formField]="signalresetPassword.password">
                        <button class="sub" type="submit">Set new password</button>
                        <button class="canc" (click)="closeModal()">Cancel</button>
                    </form>
                }
                @else {
                    <div class="reset-function">
                        <span>Please enter valid email</span>
                        <input [disabled]="userToReset()" type="email" #emailInput>
                        <button class="sub" [disabled]="userToReset()" (click)="validateEmail(emailInput.value)">Check email</button>
                        <button class="canc" (click)="closeModal()">Cancel</button>
                    </div>
                }
            </div>
        }
    }
</div>
